<div class="main-content">

      <div class="">
          
              <div class="card">
                  <div class="card-header card-header-danger">
                      <h4 class="card-title">Edit Contrat</h4>
                      <p class="card-category"></p>
                  </div>
                  <div class="card-body">
                      <form [formGroup]="Reactiveform" (ngSubmit)="putpassenger('5ef4a412aab3841847750ce8')">
                          <div class="row">
                              <div class="col-md-12">
                                <mat-form-field class="example-full-width">
                                    <input matInput placeholder="veuillez modifier le contrat" disabled>
                                  </mat-form-field>
                              </div>
                          </div>
                          <div class="row">
                              <div class="col-md-6">
                                <mat-form-field class="example-full-width">
                                  <input matInput name="dateDeb"  type="date">
                                </mat-form-field>
                              </div>
                              <div class="col-md-6">
                                <mat-form-field class="example-full-width">
                                  <input matInput name="dateFin" type="date">
                                </mat-form-field>
                              </div>
                          </div>
                          <div class="row">
                              <div class="col-md-12">
                                <mat-form-field class="example-full-width">
                                  <input matInput placeholder="Montant" name="montant" type="number">
                                </mat-form-field>
                              </div>
                          </div>
                          <div class="row">
                            <div class="col-md-12">
                              <mat-form-field appearance="fill">
                                <mat-label>Changer l'etat d'archive</mat-label>
                                <mat-select [(ngModel)]="contrat.archive" [(value)]="selected1" #arch="ngModel" required>
                                  <mat-option>None</mat-option>
                                  <mat-option value="false">False</mat-option>
                                  <mat-option value="true">True</mat-option>
                                </mat-select>
                              </mat-form-field>
                            </div>
                          </div>
                          <div class="row">
                            <div class="col-md-12">
                              <mat-form-field appearance="fill">
                                <mat-label>Choisir une specialite</mat-label>
                                <mat-select [(ngModel)]="contrat.spec" [(value)]="selected" #spe="ngModel" required>
                                  <mat-option>None</mat-option>
                                  <mat-option value="IA">IA</mat-option>
                                  <mat-option value="Resaux">Resaux</mat-option>
                                  <mat-option value="Cloud">Cloud</mat-option>
                                  <mat-option value="Securite">Securite</mat-option>
                                </mat-select>
                              </mat-form-field>
                            </div>
                          </div>
                          <button mat-raised-button type="submit" class="btn btn-danger pull-right">Update Contrat</button>
                          <div class="clearfix"></div>
                      </form>
                  </div>
              </div>
          
          
      </div>

</div>
